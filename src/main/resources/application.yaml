spring:
  application:
    name: humtune
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/humtune}
    username: ${SPRING_DATASOURCE_USERNAME:humtune}
    password: ${SPRING_DATASOURCE_PASSWORD:humtune}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  sql:
    init:
      mode: never

audio-service:
  base-url: ${AUDIO_SERVICE_BASE_URL:http://127.0.0.1:8000}
  connect-timeout: ${AUDIO_SERVICE_CONNECT_TIMEOUT:3s}
  response-timeout: ${AUDIO_SERVICE_RESPONSE_TIMEOUT:120s}

ai-feedback:
  enabled: ${AI_FEEDBACK_ENABLED:false}

gemini:
  api-key: ${GEMINI_API_KEY:}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  model: ${GEMINI_MODEL:}
  generate-content-path: ${GEMINI_GENERATE_CONTENT_PATH:/v1beta/models/{model}:generateContent}
  connect-timeout: ${GEMINI_CONNECT_TIMEOUT:3s}
  read-timeout: ${GEMINI_READ_TIMEOUT:10s}

humtune:
  cors:
    allowed-origins: ${HUMTUNE_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  audio:
    storage-path: ${HUMTUNE_AUDIO_STORAGE_PATH:storage/raw}
    output-directory: ${HUMTUNE_AUDIO_OUTPUT_DIRECTORY:storage/midi}
