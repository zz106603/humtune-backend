spring:
  application:
    name: humtune
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/humtune}
    username: ${SPRING_DATASOURCE_USERNAME:humtune}
    password: ${SPRING_DATASOURCE_PASSWORD:humtune}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
  sql:
    init:
      mode: never

audio-service:
  base-url: ${AUDIO_SERVICE_BASE_URL:http://127.0.0.1:8000}

humtune:
  audio:
    output-directory: ${HUMTUNE_AUDIO_OUTPUT_DIRECTORY:build/audio-outputs}
